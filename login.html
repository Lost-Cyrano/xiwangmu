<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xiwangmu CRF – Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    
    .login-container { background: white; border-radius: 14px; border: 1px solid #e5e5e5; padding: 28px 24px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
    
    .login-header { text-align: center; margin-bottom: 24px; }
    .login-header img { height: 48px; margin-bottom: 10px; }
    .login-header h1 { font-size: 1.1rem; font-weight: 600; color: #1a1a1a; }
    .login-header p { font-size: 0.8rem; color: #888; margin-top: 4px; }
    
    .field { margin-bottom: 14px; }
    .field label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px; }
    .field input { width: 100%; padding: 11px 14px; border: 1px solid #e5e5e5; border-radius: 10px; font-size: 0.9rem; font-family: inherit; background: #fafafa; transition: border 0.15s, box-shadow 0.15s; }
    .field input:focus { outline: none; border-color: #e60000; background: white; box-shadow: 0 0 0 3px rgba(230,0,0,0.06); }
    .field input::placeholder { color: #bbb; }
    
    button { width: 100%; padding: 12px; background: #e60000; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.15s; }
    button:hover { background: #c40000; }
    button:active { background: #a00000; }
    
    .error { color: #c00; font-size: 0.8rem; margin-top: 10px; text-align: center; min-height: 20px; }
    
    @media (max-width: 400px) {
      .login-container { padding: 22px 16px; }
      .login-header img { height: 40px; }
    }

      .btn-logout {
          background: none;
          border: 1px solid #e0e0e0;
          color: #888;
          padding: 6px 12px;
          border-radius: 6px;
          cursor: pointer;
          font-size: 0.7rem;
          transition: all 0.15s;
          margin-top: 8px;
          width: 100%;
      }

          .btn-logout:hover {
              background: #fff5f5;
              border-color: #fcc;
              color: #c00;
          }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="https://github.com/Lost-Cyrano/xiwangmu/blob/main/images/Xiwangmu.png?raw=true" alt="Xiwangmu">
      <h1>Xiwangmu CRF</h1>
      <p>Connectez-vous avec votre NIVOL</p>
    </div>
    
    <form id="login-form">
      <div class="field">
        <label for="nivol">NIVOL</label>
        <input type="text" id="nivol" placeholder="ex: 01234567890A" required pattern="[0-9A-Za-z]{12}" maxlength="12" autocomplete="off">
      </div>
      <button type="submit">Se connecter</button>
    </form>
    
    <p id="message" class="error"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth, signInAnonymously, updateProfile, deleteUser, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAigiFFGONooT17W11gnABs1aHKN0O3N9s",
      authDomain: "xiwangmu-crf.firebaseapp.com",
      projectId: "xiwangmu-crf",
      storageBucket: "xiwangmu-crf.firebasestorage.app",
      messagingSenderId: "990701485221",
      appId: "1:990701485221:web:efa9e1842c07af4fd1a14c",
      measurementId: "G-J9TZ23YECY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const redirectUrl = urlParams.get('redirect');

    const form = document.getElementById('login-form');
    const nivolInput = document.getElementById('nivol');
    const messageEl = document.getElementById('message');

    // Si déjà connecté, rediriger directement
    onAuthStateChanged(auth, async (user) => {
      if (user && user.displayName && user.photoURL) {
        const role = user.photoURL;
        const destination = getDestinationUrl(role);
        window.location.href = redirectUrl ? decodeURIComponent(redirectUrl) : destination;
      }
    });

    function getDestinationUrl(role) {
      if (role === 'cdp') return './ci.html';
      return './user.html';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageEl.textContent = '';

      const nivol = nivolInput.value.trim().toUpperCase();
      if (!/^[0-9A-Z]{12}$/.test(nivol)) {
        messageEl.textContent = 'Format de NIVOL invalide (12 caractères alphanumériques).';
        return;
      }

      try {
        const userCredential = await signInAnonymously(auth);
        const user = userCredential.user;

        const userSnap = await getDoc(doc(db, 'U', nivol));

        if (!userSnap.exists()) {
          await deleteUser(user);
          messageEl.textContent = 'NIVOL non reconnu. Veuillez réessayer.';
          return;
        }

        const userData = userSnap.data();
        const fonction = userData?.F || '';

        // Déterminer le rôle : Chef de Poste ou simple utilisateur
        let role = 'user';
        if (fonction === 'Chef de Poste') {
          role = 'cdp';
        }

        await updateProfile(user, {
          displayName: nivol,
          photoURL: role
        });

        const destinationUrl = getDestinationUrl(role);

        if (redirectUrl) {
          window.location.href = decodeURIComponent(redirectUrl);
        } else {
          window.location.href = destinationUrl;
        }

      } catch (error) {
        console.error('Erreur:', error);
        messageEl.textContent = 'Une erreur technique est survenue. Veuillez réessayer.';
        if (auth.currentUser) {
          try { await deleteUser(auth.currentUser); } catch (e) {}
        }
      }
    });
  </script>
</body>
</html>
