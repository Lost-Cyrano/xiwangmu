<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xiwangmu CRF – Téléchargement</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .container { background: white; border-radius: 14px; border: 1px solid #e5e5e5; padding: 28px 24px; width: 100%; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); text-align: center; }

    .container img { height: 40px; margin-bottom: 16px; }
    .container h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
    .container p { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    button { width: 100%; padding: 12px; background: #e60000; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.15s; margin-bottom: 8px; }
    button:hover { background: #c40000; }
    button:active { background: #a00000; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .btn-back { background: #f0f0f0; color: #333; }
    .btn-back:hover { background: #e0e0e0; }

    .progress { margin-top: 16px; font-size: 0.8rem; color: #888; }
    .error { color: #c00; font-size: 0.8rem; margin-top: 10px; }

    @media (max-width: 400px) {
      .container { padding: 20px 16px; }
    }
  </style>
  
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

  
</head>
<body>
  <div class="container">
    <img src="https://github.com/Lost-Cyrano/xiwangmu/blob/main/images/Xiwangmu.png?raw=true" alt="Xiwangmu">
    <h1>Télécharger les documents</h1>
    <p>Générez et téléchargez la main courante au format PDF.</p>
    
    <button id="btn-generate" onclick="generatePDF()">📥 Télécharger la main courante</button>
    <button class="btn-back" onclick="window.location.href='./ci.html'">← Retour</button>
    
    <div class="progress" id="progress"></div>
    <p class="error" id="error"></p>
  </div>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAigiFFGONooT17W11gnABs1aHKN0O3N9s",
      authDomain: "xiwangmu-crf.firebaseapp.com",
      projectId: "xiwangmu-crf",
      storageBucket: "xiwangmu-crf.firebasestorage.app",
      messagingSenderId: "990701485221",
      appId: "1:990701485221:web:efa9e1842c07af4fd1a14c",
      measurementId: "G-J9TZ23YECY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let CURRENT_NIVOL = null;

    // Vérification de l'authentification
    onAuthStateChanged(auth, async (user) => {
      if (!user || !user.displayName) {
        window.location.href = './login.html?redirect=' + encodeURIComponent(window.location.href);
        return;
      }
      CURRENT_NIVOL = user.displayName;
    });

    // Charger un fichier en ArrayBuffer
    async function fetchPDF(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Impossible de charger ${url}`);
      return await response.arrayBuffer();
    }

    // Remplir les champs d'un PDF avec pdf-lib
    async function fillMainCourantePage(pdfDoc, pageIndex, entries, totalPages) {
      const form = pdfDoc.getForm();
      const LINES_PER_PAGE = 15;
      const startIndex = pageIndex * LINES_PER_PAGE;
      const pageEntries = entries.slice(startIndex, startIndex + LINES_PER_PAGE);

      for (let i = 0; i < LINES_PER_PAGE; i++) {
        const lineNum = i + 1;
        const entry = pageEntries[i] || null;

        const aField = form.getTextField(`A${lineNum}`);
        const oField = form.getTextField(`O${lineNum}`);
        const dField = form.getTextField(`D${lineNum}`);
        const eField = form.getTextField(`E${lineNum}`);
        const tField = form.getTextField(`T${lineNum}`);
        const sField = form.getTextField(`S${lineNum}`);
        const fField = form.getTextField(`F${lineNum}`);

        if (entry) {
          aField.setText(entry.heureArrivee || '');
          oField.setText(entry.origine || '');
          dField.setText(entry.destinataire || '');
          eField.setText(entry.description || '');
          tField.setText(entry.type || '');
          sField.setText(entry.suite || '');
          fField.setText(entry.heureDepart || '');
        } else {
          aField.setText('');
          oField.setText('');
          dField.setText('');
          eField.setText('');
          tField.setText('');
          sField.setText('');
          fField.setText('');
        }
      }

      // Remplir la date du jour
      const today = new Date();
      const dateStr = today.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
      try {
        const dateField = form.getTextField('Date');
        dateField.setText(dateStr);
      } catch (e) { /* champ Date pas présent sur toutes les pages */ }

      // Remplir N1 et N2
      try {
        const n1Field = form.getTextField('N1');
        n1Field.setText(String(pageIndex + 1));
      } catch (e) { /* N1 pas présent sur la page de stats */ }

      try {
        const n2Field = form.getTextField('N2');
        n2Field.setText(String(totalPages));
      } catch (e) { /* N2 pas présent sur la page de stats */ }
    }

    async function fillStatsPage(pdfDoc, allFiches, totalPages) {
      const form = pdfDoc.getForm();

      // Compter les stats
      let totalSoins = allFiches.length;
      let totalDecharge = 0;
      let totalEvacCRF = 0;
      let totalEvacAutre = 0;
      let totalDAE = 0;
      let countTraumatismes = 0;
      let countPetitsSoins = 0;
      let countMalaises = 0;
      let countInconscients = 0;
      let countACR = 0;

      allFiches.forEach(f => {
        // Type de soins
        const type = f.typeSoins || '';
        if (type === 'Traumatisme') countTraumatismes++;
        else if (type === 'Petit soin') countPetitsSoins++;
        else if (type === 'Malaise/maladie') countMalaises++;
        else if (type === 'Inconscient') countInconscients++;
        else if (type === 'Arrêt Cardiaque') countACR++;

        // Décharge
        if (f.decharge === true) totalDecharge++;

        // Évacuation
        if (f.evacuationType === 'CRF') totalEvacCRF++;
        else if (f.evacuationType && f.evacuationType !== 'CRF') totalEvacAutre++;

        // DAE
        if (f.dae === true) totalDAE++;
      });

      const total = totalSoins + totalDecharge;

      // Remplir les champs
      try { form.getTextField('NombreDePage3').setText(String(totalPages)); } catch (e) {}
      try { form.getTextField('Total').setText(String(total)); } catch (e) {}
      try { form.getTextField('Soins').setText(String(totalSoins)); } catch (e) {}
      try { form.getTextField('Traumatismes').setText(String(countTraumatismes)); } catch (e) {}
      try { form.getTextField('Petits_Soins').setText(String(countPetitsSoins)); } catch (e) {}
      try { form.getTextField('MalaisesEtMaladies').setText(String(countMalaises)); } catch (e) {}
      try { form.getTextField('Inconscients').setText(String(countInconscients)); } catch (e) {}
      try { form.getTextField('ACR').setText(String(countACR)); } catch (e) {}
      try { form.getTextField('DAE').setText(String(totalDAE)); } catch (e) {}
      try { form.getTextField('Decharge').setText(String(totalDecharge)); } catch (e) {}
      try { form.getTextField('EvacuationCRF').setText(String(totalEvacCRF)); } catch (e) {}
      try { form.getTextField('EvacuationAutre').setText(String(totalEvacAutre)); } catch (e) {}
    }

    window.generatePDF = async function() {
      const btn = document.getElementById('btn-generate');
      const progressEl = document.getElementById('progress');
      const errorEl = document.getElementById('error');

      btn.disabled = true;
      btn.textContent = 'Génération en cours...';
      progressEl.textContent = '';
      errorEl.textContent = '';

      try {
        // Charger la bibliothèque pdf-lib
        progressEl.textContent = 'Chargement de la bibliothèque PDF...';
        const { PDFDocument } = window.PDFLib;
        if (!PDFDocument) throw new Error('pdf-lib non chargé');

        // Récupérer toutes les entrées de la main courante (toutes équipes confondues)
        progressEl.textContent = 'Récupération des données...';
        const mcSnap = await getDocs(collection(db, 'M'));
        const allEntries = [];
        mcSnap.forEach(d => allEntries.push({ id: d.id, ...d.data() }));

        // Trier par heure d'arrivée croissante (plus vieux en premier)
        allEntries.sort((a, b) => (a.heureArrivee || '').localeCompare(b.heureArrivee || ''));

        // Récupérer toutes les fiches d'intervention pour les stats
        const fichesSnap = await getDocs(collection(db, 'I'));
        const allFiches = [];
        fichesSnap.forEach(d => allFiches.push({ id: d.id, ...d.data() }));

        const LINES_PER_PAGE = 15;
        const totalMCPages = Math.max(1, Math.ceil(allEntries.length / LINES_PER_PAGE));
        // +1 pour la page de stats
        const totalPages = totalMCPages + 1;

        progressEl.textContent = `Génération de ${totalPages} pages...`;

        // Charger le template de page 3 (main courante)
        const mcTemplateBytes = await fetchPDF('./documents/Main courante-page3-FORM.pdf');
        const mcTemplateDoc = await PDFDocument.load(mcTemplateBytes);

        // Charger le template de page 4 (stats)
        const statsTemplateBytes = await fetchPDF('./documents/Main courante-page4-FORM.pdf');
        const statsTemplateDoc = await PDFDocument.load(statsTemplateBytes);

        // Créer le document final
        const finalDoc = await PDFDocument.create();

        // Pour chaque page de main courante
        for (let p = 0; p < totalMCPages; p++) {
          progressEl.textContent = `Page ${p + 1}/${totalMCPages}...`;
          
          // Copier les pages du template
          const [templatePage] = await finalDoc.copyPages(mcTemplateDoc, [0]);
          finalDoc.addPage(templatePage);

          // Remplir les champs pour cette page
          await fillMainCourantePage(finalDoc, p, allEntries, totalPages);
        }

        // Ajouter la page de stats
        progressEl.textContent = 'Génération des statistiques...';
        const [statsPage] = await finalDoc.copyPages(statsTemplateDoc, [0]);
        finalDoc.addPage(statsPage);
        await fillStatsPage(finalDoc, allFiches, totalPages);

        // Sauvegarder et télécharger
        progressEl.textContent = 'Finalisation du PDF...';
        const pdfBytes = await finalDoc.save();
        
        // Télécharger
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `main-courante-${new Date().toISOString().split('T')[0]}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        progressEl.textContent = '✅ Téléchargement terminé !';
        btn.textContent = '📥 Télécharger la main courante';
        btn.disabled = false;

      } catch (e) {
        console.error('Erreur:', e);
        errorEl.textContent = 'Erreur: ' + e.message;
        btn.textContent = '📥 Télécharger la main courante';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
