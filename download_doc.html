<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xiwangmu CRF – Téléchargement</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .container { background: white; border-radius: 14px; border: 1px solid #e5e5e5; padding: 28px 24px; width: 100%; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); text-align: center; }

    .container img { height: 40px; margin-bottom: 16px; }
    .container h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
    .container p { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    button { width: 100%; padding: 12px; background: #e60000; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.15s; margin-bottom: 8px; }
    button:hover { background: #c40000; }
    button:active { background: #a00000; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .btn-back { background: #f0f0f0; color: #333; }
    .btn-back:hover { background: #e0e0e0; }

    .progress { margin-top: 16px; font-size: 0.8rem; color: #888; }
    .error { color: #c00; font-size: 0.8rem; margin-top: 10px; }

    @media (max-width: 400px) {
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://github.com/Lost-Cyrano/xiwangmu/blob/main/images/Xiwangmu.png?raw=true" alt="Xiwangmu">
    <h1>Télécharger les documents</h1>
    <p>Générez et téléchargez la main courante au format PDF.</p>
    
    <button id="btn-generate" onclick="generatePDF()">📥 Télécharger la main courante</button>
    <button class="btn-back" onclick="window.location.href='./ci.html'">← Retour</button>
    
    <div class="progress" id="progress"></div>
    <p class="error" id="error"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAigiFFGONooT17W11gnABs1aHKN0O3N9s",
      authDomain: "xiwangmu-crf.firebaseapp.com",
      projectId: "xiwangmu-crf",
      storageBucket: "xiwangmu-crf.firebasestorage.app",
      messagingSenderId: "990701485221",
      appId: "1:990701485221:web:efa9e1842c07af4fd1a14c",
      measurementId: "G-J9TZ23YECY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let CURRENT_NIVOL = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user || !user.displayName) {
        window.location.href = './login.html?redirect=' + encodeURIComponent(window.location.href);
        return;
      }
      CURRENT_NIVOL = user.displayName;
    });

    async function fetchPDF(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Impossible de charger ${url} (statut ${response.status})`);
      return await response.arrayBuffer();
    }

    // Calculer la taille de police optimale pour faire rentrer le texte dans la zone
    function calculateOptimalFontSize(text, fieldWidth, fieldHeight, baseFontSize) {
      if (!text || text.length === 0) return baseFontSize;
      
      // Estimation : un caractère fait environ 0.5 * fontSize de large en moyenne
      // et la hauteur est d'environ 1.2 * fontSize
      const maxWidth = fieldWidth - 2; // petite marge
      const maxHeight = fieldHeight - 2;
      
      // Taille max basée sur la largeur
      const sizeByWidth = (maxWidth / (text.length * 0.5));
      // Taille max basée sur la hauteur
      const sizeByHeight = maxHeight / 1.2;
      
      let optimalSize = Math.min(sizeByWidth, sizeByHeight, baseFontSize);
      optimalSize = Math.max(optimalSize, 4); // pas plus petit que 4pt
      optimalSize = Math.min(optimalSize, baseFontSize); // pas plus grand que la taille de base
      
      return Math.round(optimalSize);
    }

    // Remplir un champ texte avec taille de police optimale
    function setTextFieldWithAutoSize(form, fieldName, text, baseFontSize, fieldWidth, fieldHeight) {
      try {
        const field = form.getTextField(fieldName);
        field.setText(text || '');
        
        if (text && text.length > 0) {
          const optimalSize = calculateOptimalFontSize(text, fieldWidth, fieldHeight, baseFontSize);
          field.setFontSize(optimalSize);
        }
      } catch (e) {
        console.warn(`Champ ${fieldName} non trouvé`);
      }
    }

    // Dimensions approximatives des champs (largeur x hauteur en points)
    const FIELD_DIMENSIONS = {
      A: { w: 52, h: 18 },  // Heure d'arrivée
      O: { w: 52, h: 18 },  // Origine
      D: { w: 68, h: 18 },  // Destinataire
      E: { w: 310, h: 18 }, // Description
      T: { w: 26, h: 18 },  // Type
      S: { w: 144, h: 18 }, // Suite
      F: { w: 54, h: 18 }   // Fin
    };

    window.generatePDF = async function() {
      const btn = document.getElementById('btn-generate');
      const progressEl = document.getElementById('progress');
      const errorEl = document.getElementById('error');

      btn.disabled = true;
      btn.textContent = 'Génération en cours...';
      progressEl.textContent = '';
      errorEl.textContent = '';

      try {
        const { PDFDocument } = window.PDFLib;
        if (!PDFDocument) throw new Error('PDFLib non chargé.');

        // Récupérer les données
        progressEl.textContent = 'Récupération des données...';
        
        const mcSnap = await getDocs(collection(db, 'M'));
        const allEntries = [];
        mcSnap.forEach(d => allEntries.push({ id: d.id, ...d.data() }));
        allEntries.sort((a, b) => (a.heureArrivee || '').localeCompare(b.heureArrivee || ''));

        const fichesSnap = await getDocs(collection(db, 'I'));
        const allFiches = [];
        fichesSnap.forEach(d => allFiches.push({ id: d.id, ...d.data() }));

        const LINES_PER_PAGE = 15;
        const totalMCPages = Math.max(1, Math.ceil(allEntries.length / LINES_PER_PAGE));
        // N2 = nombre de pages de type "page-3" uniquement (pas la page stats)
        const N2_VALUE = totalMCPages;

        progressEl.textContent = `${allEntries.length} entrées → ${totalMCPages} page(s) MC`;

        // Charger les templates
        progressEl.textContent = 'Chargement des templates...';
        const mcTemplateBytes = await fetchPDF('./documents/Main courante-page3-FORM.pdf');
        const statsTemplateBytes = await fetchPDF('./documents/Main courante-page4-FORM.pdf');

        // Créer le document final
        const finalDoc = await PDFDocument.create();

        // === PAGES MAIN COURANTE ===
        const BASE_FONT_SIZE = 8; // taille de base

        for (let p = 0; p < totalMCPages; p++) {
          progressEl.textContent = `Page MC ${p + 1}/${totalMCPages}...`;
          
          const pageDoc = await PDFDocument.load(mcTemplateBytes);
          const form = pageDoc.getForm();

          const startIndex = p * LINES_PER_PAGE;
          const pageEntries = allEntries.slice(startIndex, startIndex + LINES_PER_PAGE);

          for (let i = 0; i < LINES_PER_PAGE; i++) {
            const lineNum = i + 1;
            const entry = pageEntries[i] || null;

            const aText = entry ? (entry.heureArrivee || '') : '';
            const oText = entry ? (entry.origine || '') : '';
            const dText = entry ? (entry.destinataire || '') : '';
            const eText = entry ? (entry.description || '') : '';
            const tText = entry ? (entry.type || '') : '';
            const sText = entry ? (entry.suite || '') : '';
            const fText = entry ? (entry.heureDepart || '') : '';

            setTextFieldWithAutoSize(form, `A${lineNum}`, aText, BASE_FONT_SIZE, FIELD_DIMENSIONS.A.w, FIELD_DIMENSIONS.A.h);
            setTextFieldWithAutoSize(form, `O${lineNum}`, oText, BASE_FONT_SIZE, FIELD_DIMENSIONS.O.w, FIELD_DIMENSIONS.O.h);
            setTextFieldWithAutoSize(form, `D${lineNum}`, dText, BASE_FONT_SIZE, FIELD_DIMENSIONS.D.w, FIELD_DIMENSIONS.D.h);
            setTextFieldWithAutoSize(form, `E${lineNum}`, eText, BASE_FONT_SIZE, FIELD_DIMENSIONS.E.w, FIELD_DIMENSIONS.E.h);
            setTextFieldWithAutoSize(form, `T${lineNum}`, tText, BASE_FONT_SIZE, FIELD_DIMENSIONS.T.w, FIELD_DIMENSIONS.T.h);
            setTextFieldWithAutoSize(form, `S${lineNum}`, sText, BASE_FONT_SIZE, FIELD_DIMENSIONS.S.w, FIELD_DIMENSIONS.S.h);
            setTextFieldWithAutoSize(form, `F${lineNum}`, fText, BASE_FONT_SIZE, FIELD_DIMENSIONS.F.w, FIELD_DIMENSIONS.F.h);
          }

          // Date du jour
          const today = new Date();
          const dateStr = today.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
          try { 
            const dateField = form.getTextField('Date');
            dateField.setText(dateStr);
            dateField.setFontSize(10);
          } catch (e) {}

          // N1 = numéro de page actuelle
          try { 
            const n1Field = form.getTextField('N1');
            n1Field.setText(String(p + 1));
            n1Field.setFontSize(12);
          } catch (e) {}

          // N2 = nombre total de pages MC (sans la page stats)
          try { 
            const n2Field = form.getTextField('N2');
            n2Field.setText(String(N2_VALUE));
            n2Field.setFontSize(12);
          } catch (e) {}

          // Copier la page remplie
          const [filledPage] = await finalDoc.copyPages(pageDoc, [0]);
          finalDoc.addPage(filledPage);
        }

        // === PAGE STATS ===
        progressEl.textContent = 'Statistiques...';
        const statsDoc = await PDFDocument.load(statsTemplateBytes);
        const statsForm = statsDoc.getForm();

        let totalSoins = allFiches.length;
        let totalDecharge = 0, totalEvacCRF = 0, totalEvacAutre = 0, totalDAE = 0;
        let ctTrauma = 0, ctPetitSoin = 0, ctMalaise = 0, ctInconscient = 0, ctACR = 0;

        allFiches.forEach(f => {
          const t = f.typeSoins || '';
          if (t === 'Traumatisme') ctTrauma++;
          else if (t === 'Petit soin') ctPetitSoin++;
          else if (t === 'Malaise/maladie') ctMalaise++;
          else if (t === 'Inconscient') ctInconscient++;
          else if (t === 'Arrêt Cardiaque') ctACR++;
          if (f.decharge === true) totalDecharge++;
          if (f.evacuationType === 'CRF') totalEvacCRF++;
          else if (f.evacuationType && f.evacuationType !== 'CRF') totalEvacAutre++;
          if (f.dae === true) totalDAE++;
        });

        const total = totalSoins + totalDecharge;

        const statFields = [
          'NombreDePage3', 'Total', 'Soins', 'Traumatismes', 'Petits_Soins',
          'MalaisesEtMaladies', 'Inconscients', 'ACR', 'DAE', 'Decharge',
          'EvacuationCRF', 'EvacuationAutre'
        ];
        const statValues = {
          'NombreDePage3': String(N2_VALUE),
          'Total': String(total),
          'Soins': String(totalSoins),
          'Traumatismes': String(ctTrauma),
          'Petits_Soins': String(ctPetitSoin),
          'MalaisesEtMaladies': String(ctMalaise),
          'Inconscients': String(ctInconscient),
          'ACR': String(ctACR),
          'DAE': String(totalDAE),
          'Decharge': String(totalDecharge),
          'EvacuationCRF': String(totalEvacCRF),
          'EvacuationAutre': String(totalEvacAutre)
        };

        statFields.forEach(fieldName => {
          try {
            const field = statsForm.getTextField(fieldName);
            field.setText(statValues[fieldName] || '0');
            field.setFontSize(11);
          } catch (e) {
            console.warn(`Champ stats ${fieldName} non trouvé`);
          }
        });

        const [statsPage] = await finalDoc.copyPages(statsDoc, [0]);
        finalDoc.addPage(statsPage);

        // === VERROUILLER LE PDF (plus éditable) ===
        progressEl.textContent = 'Verrouillage du document...';
        
        // 1. Aplatir les champs de formulaire
        const form = finalDoc.getForm();
        form.flatten();

        // 2. Ajouter des restrictions de permissions (lecture seule, pas d'impression basse qualité)
        finalDoc.setTitle('Main Courante - Xiwangmu CRF');
        finalDoc.setAuthor('Xiwangmu CRF');
        finalDoc.setSubject('Main Courante');
        finalDoc.setKeywords(['main courante', 'CRF', 'xiwangmu']);
        finalDoc.setProducer('Xiwangmu CRF');
        finalDoc.setCreator('Xiwangmu CRF');

        // Télécharger
        progressEl.textContent = 'Finalisation...';
        const pdfBytes = await finalDoc.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        a.download = `main-courante-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        progressEl.textContent = '✅ Téléchargement terminé !';
        btn.textContent = '📥 Télécharger la main courante';
        btn.disabled = false;

      } catch (e) {
        console.error('Erreur:', e);
        errorEl.textContent = 'Erreur: ' + e.message;
        btn.textContent = '📥 Télécharger la main courante';
        btn.disabled = false;
        progressEl.textContent = '';
      }
    };
  </script>
</body>
</html>
