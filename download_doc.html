<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xiwangmu CRF – Téléchargement</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .container { background: white; border-radius: 14px; border: 1px solid #e5e5e5; padding: 28px 24px; width: 100%; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); text-align: center; }

    .container img { height: 40px; margin-bottom: 16px; }
    .container h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
    .container p { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    button { width: 100%; padding: 12px; background: #e60000; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.15s; margin-bottom: 8px; }
    button:hover { background: #c40000; }
    button:active { background: #a00000; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .btn-back { background: #f0f0f0; color: #333; }
    .btn-back:hover { background: #e0e0e0; }

    .progress { margin-top: 16px; font-size: 0.8rem; color: #888; }
    .error { color: #c00; font-size: 0.8rem; margin-top: 10px; }

    @media (max-width: 400px) {
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://github.com/Lost-Cyrano/xiwangmu/blob/main/images/Xiwangmu.png?raw=true" alt="Xiwangmu">
    <h1>Télécharger les documents</h1>
    <p>Générez et téléchargez la main courante au format PDF.</p>
    
    <button id="btn-generate" onclick="generatePDF()">📥 Télécharger la main courante</button>
    <button class="btn-back" onclick="window.location.href='./ci.html'">← Retour</button>
    
    <div class="progress" id="progress"></div>
    <p class="error" id="error"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAigiFFGONooT17W11gnABs1aHKN0O3N9s",
      authDomain: "xiwangmu-crf.firebaseapp.com",
      projectId: "xiwangmu-crf",
      storageBucket: "xiwangmu-crf.firebasestorage.app",
      messagingSenderId: "990701485221",
      appId: "1:990701485221:web:efa9e1842c07af4fd1a14c",
      measurementId: "G-J9TZ23YECY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let CURRENT_NIVOL = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user || !user.displayName) {
        window.location.href = './login.html?redirect=' + encodeURIComponent(window.location.href);
        return;
      }
      CURRENT_NIVOL = user.displayName;
    });

    async function fetchPDF(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Impossible de charger ${url} (statut ${response.status})`);
      return await response.arrayBuffer();
    }

    window.generatePDF = async function() {
      const btn = document.getElementById('btn-generate');
      const progressEl = document.getElementById('progress');
      const errorEl = document.getElementById('error');

      btn.disabled = true;
      btn.textContent = 'Génération en cours...';
      progressEl.textContent = '';
      errorEl.textContent = '';

      try {
        const { PDFDocument } = window.PDFLib;
        if (!PDFDocument) throw new Error('PDFLib non chargé.');

        // Récupérer les données
        progressEl.textContent = 'Récupération des données...';
        
        const mcSnap = await getDocs(collection(db, 'M'));
        const allEntries = [];
        mcSnap.forEach(d => allEntries.push({ id: d.id, ...d.data() }));
        allEntries.sort((a, b) => (a.heureArrivee || '').localeCompare(b.heureArrivee || ''));

        const fichesSnap = await getDocs(collection(db, 'I'));
        const allFiches = [];
        fichesSnap.forEach(d => allFiches.push({ id: d.id, ...d.data() }));

        const LINES_PER_PAGE = 15;
        const totalMCPages = Math.max(1, Math.ceil(allEntries.length / LINES_PER_PAGE));
        const n2Value = totalMCPages;

        progressEl.textContent = `${allEntries.length} entrées → ${totalMCPages} page(s) MC + 1 page stats`;

        // Charger les templates
        progressEl.textContent = 'Chargement des templates...';
        const mcTemplateBytes = await fetchPDF('./documents/Main courante-page3-FORM.pdf');
        const statsTemplateBytes = await fetchPDF('./documents/Main courante-page4-FORM.pdf');
        const autreDocBytes = await fetchPDF('./documents/Main courante_Autre.pdf');

        // Charger le document "Autre" pour récupérer ses pages
        const autreDoc = await PDFDocument.load(autreDocBytes);
        const autrePages = autreDoc.getPages();
        
        if (autrePages.length < 3) {
          throw new Error('Le document Main courante_Autre.pdf doit contenir au moins 3 pages.');
        }

        // Pages 1 et 2 de "Autre" → à mettre au début
        // Page 3 de "Autre" → à mettre à la fin
        const autrePage1 = autrePages[0]; // page 1
        const autrePage2 = autrePages[1]; // page 2
        const autrePage3 = autrePages[2]; // page 3 (sera la dernière)

        // Créer le document final
        const finalDoc = await PDFDocument.create();

        // === INSÉRER PAGE 1 DE "AUTRE" ===
        const [copiedAutrePage1] = await finalDoc.copyPages(autreDoc, [0]);
        finalDoc.addPage(copiedAutrePage1);

        // === INSÉRER PAGE 2 DE "AUTRE" ===
        const [copiedAutrePage2] = await finalDoc.copyPages(autreDoc, [1]);
        finalDoc.addPage(copiedAutrePage2);

        // === PAGES MAIN COURANTE ===
        for (let p = 0; p < totalMCPages; p++) {
          progressEl.textContent = `Page MC ${p + 1}/${totalMCPages}...`;
          
          const pageDoc = await PDFDocument.load(mcTemplateBytes);
          const form = pageDoc.getForm();

          const startIndex = p * LINES_PER_PAGE;
          const pageEntries = allEntries.slice(startIndex, startIndex + LINES_PER_PAGE);

          // Remplir les champs
          for (let i = 0; i < LINES_PER_PAGE; i++) {
            const lineNum = i + 1;
            const entry = pageEntries[i] || null;

            form.getTextField(`A${lineNum}`).setText(entry ? (entry.heureArrivee || '') : '');
            form.getTextField(`O${lineNum}`).setText(entry ? (entry.origine || '') : '');
            form.getTextField(`D${lineNum}`).setText(entry ? (entry.destinataire || '') : '');
            form.getTextField(`E${lineNum}`).setText(entry ? (entry.description || '') : '');
            form.getTextField(`T${lineNum}`).setText(entry ? (entry.type || '') : '');
            form.getTextField(`S${lineNum}`).setText(entry ? (entry.suite || '') : '');
            form.getTextField(`F${lineNum}`).setText(entry ? (entry.heureDepart || '') : '');
          }

          // Date, N1, N2
          const today = new Date();
          const dateStr = today.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
          try { form.getTextField('Date').setText(dateStr); } catch (e) {}
          try { form.getTextField('N1').setText(String(p + 1)); } catch (e) {}
          try { form.getTextField('N2').setText(String(n2Value)); } catch (e) {}

          // Aplatir le formulaire
          form.flatten();

          // Copier dans le document final
          const [filledPage] = await finalDoc.copyPages(pageDoc, [0]);
          finalDoc.addPage(filledPage);
        }

        // === PAGE STATS ===
        progressEl.textContent = 'Statistiques...';
        const statsDoc = await PDFDocument.load(statsTemplateBytes);
        const statsForm = statsDoc.getForm();

        let totalSoins = allFiches.length;
        let totalDecharge = 0, totalEvacCRF = 0, totalEvacAutre = 0, totalDAE = 0;
        let ctTrauma = 0, ctPetitSoin = 0, ctMalaise = 0, ctInconscient = 0, ctACR = 0;

        allFiches.forEach(f => {
          const t = f.typeSoins || '';
          if (t === 'Traumatisme') ctTrauma++;
          else if (t === 'Petit soin') ctPetitSoin++;
          else if (t === 'Malaise/maladie') ctMalaise++;
          else if (t === 'Inconscient') ctInconscient++;
          else if (t === 'Arrêt Cardiaque') ctACR++;
          if (f.decharge === true) totalDecharge++;
          if (f.evacuationType === 'CRF') totalEvacCRF++;
          else if (f.evacuationType && f.evacuationType !== 'CRF') totalEvacAutre++;
          if (f.dae === true) totalDAE++;
        });

        const total = totalSoins + totalDecharge;

        try { statsForm.getTextField('NombreDePage3').setText(String(n2Value)); } catch (e) {}
        try { statsForm.getTextField('Total').setText(String(total)); } catch (e) {}
        try { statsForm.getTextField('Soins').setText(String(totalSoins)); } catch (e) {}
        try { statsForm.getTextField('Traumatismes').setText(String(ctTrauma)); } catch (e) {}
        try { statsForm.getTextField('Petits_Soins').setText(String(ctPetitSoin)); } catch (e) {}
        try { statsForm.getTextField('MalaisesEtMaladies').setText(String(ctMalaise)); } catch (e) {}
        try { statsForm.getTextField('Inconscients').setText(String(ctInconscient)); } catch (e) {}
        try { statsForm.getTextField('ACR').setText(String(ctACR)); } catch (e) {}
        try { statsForm.getTextField('DAE').setText(String(totalDAE)); } catch (e) {}
        try { statsForm.getTextField('Decharge').setText(String(totalDecharge)); } catch (e) {}
        try { statsForm.getTextField('EvacuationCRF').setText(String(totalEvacCRF)); } catch (e) {}
        try { statsForm.getTextField('EvacuationAutre').setText(String(totalEvacAutre)); } catch (e) {}

        // Aplatir
        statsForm.flatten();

        const [statsPage] = await finalDoc.copyPages(statsDoc, [0]);
        finalDoc.addPage(statsPage);

        // === INSÉRER PAGE 3 DE "AUTRE" EN DERNIÈRE PAGE ===
        const [copiedAutrePage3] = await finalDoc.copyPages(autreDoc, [2]);
        finalDoc.addPage(copiedAutrePage3);

        // Sauvegarder et télécharger
        progressEl.textContent = 'Finalisation...';
        const pdfBytes = await finalDoc.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        a.download = `main-courante-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        progressEl.textContent = '✅ Téléchargement terminé !';
        btn.textContent = '📥 Télécharger la main courante';
        btn.disabled = false;

      } catch (e) {
        console.error('Erreur:', e);
        errorEl.textContent = 'Erreur: ' + e.message;
        btn.textContent = '📥 Télécharger la main courante';
        btn.disabled = false;
        progressEl.textContent = '';
      }
    };
  </script>
</body>
</html>
