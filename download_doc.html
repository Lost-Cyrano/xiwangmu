<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xiwangmu CRF – Téléchargement</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .container { background: white; border-radius: 14px; border: 1px solid #e5e5e5; padding: 28px 24px; width: 100%; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); text-align: center; }

    .container img { height: 40px; margin-bottom: 16px; }
    .container h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
    .container p { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    button { width: 100%; padding: 12px; background: #e60000; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.15s; margin-bottom: 8px; }
    button:hover { background: #c40000; }
    button:active { background: #a00000; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .btn-back { background: #f0f0f0; color: #333; }
    .btn-back:hover { background: #e0e0e0; }

    .progress { margin-top: 16px; font-size: 0.8rem; color: #888; }
    .error { color: #c00; font-size: 0.8rem; margin-top: 10px; }
    .success { color: #0a0; font-size: 0.8rem; margin-top: 4px; }

    @media (max-width: 400px) {
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://github.com/Lost-Cyrano/xiwangmu/blob/main/images/Xiwangmu.png?raw=true" alt="Xiwangmu">
    <h1>Télécharger les documents</h1>
    <p>Générez et téléchargez les documents au format PDF.</p>
    
    <button id="btn-mc" onclick="generateMainCourante()">📋 Télécharger la main courante</button>
    <button id="btn-rm" onclick="generateRapportMission()">📊 Télécharger le rapport de mission</button>
    <button class="btn-back" onclick="window.location.href='./ci.html'">← Retour</button>
    
    <div class="progress" id="progress"></div>
    <p class="success" id="success"></p>
    <p class="error" id="error"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAigiFFGONooT17W11gnABs1aHKN0O3N9s",
      authDomain: "xiwangmu-crf.firebaseapp.com",
      projectId: "xiwangmu-crf",
      storageBucket: "xiwangmu-crf.firebasestorage.app",
      messagingSenderId: "990701485221",
      appId: "1:990701485221:web:efa9e1842c07af4fd1a14c",
      measurementId: "G-J9TZ23YECY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let CURRENT_NIVOL = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user || !user.displayName) {
        window.location.href = './login.html?redirect=' + encodeURIComponent(window.location.href);
        return;
      }
      CURRENT_NIVOL = user.displayName;
    });

    async function fetchPDF(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Impossible de charger ${url} (statut ${response.status})`);
      return await response.arrayBuffer();
    }

    // ========== DONNÉES PARTAGÉES ==========
    async function loadAllData() {
      const mcSnap = await getDocs(collection(db, 'M'));
      const allEntries = [];
      mcSnap.forEach(d => allEntries.push({ id: d.id, ...d.data() }));
      allEntries.sort((a, b) => (a.heureArrivee || '').localeCompare(b.heureArrivee || ''));

      const fichesSnap = await getDocs(collection(db, 'I'));
      const allFiches = [];
      fichesSnap.forEach(d => allFiches.push({ id: d.id, ...d.data() }));

      return { allEntries, allFiches };
    }

    function computeStats(allFiches) {
      let totalSoins = allFiches.length;
      let totalDecharge = 0, totalEvacCRF = 0, totalEvacAutre = 0, totalDAE = 0;
      let ctTrauma = 0, ctPetitSoin = 0, ctMalaise = 0, ctInconscient = 0, ctACR = 0;

      allFiches.forEach(f => {
        const t = f.typeSoins || '';
        if (t === 'Traumatisme') ctTrauma++;
        else if (t === 'Petit soin') ctPetitSoin++;
        else if (t === 'Malaise/maladie') ctMalaise++;
        else if (t === 'Inconscient') ctInconscient++;
        else if (t === 'Arrêt Cardiaque') ctACR++;
        if (f.decharge === true) totalDecharge++;
        if (f.evacuationType === 'CRF') totalEvacCRF++;
        else if (f.evacuationType && f.evacuationType !== 'CRF') totalEvacAutre++;
        if (f.dae === true) totalDAE++;
      });

      const total = totalSoins + totalDecharge;

      return { totalSoins, totalDecharge, totalEvacCRF, totalEvacAutre, totalDAE, ctTrauma, ctPetitSoin, ctMalaise, ctInconscient, ctACR, total };
    }

    // ========== MAIN COURANTE ==========
    window.generateMainCourante = async function() {
      const btn = document.getElementById('btn-mc');
      const progressEl = document.getElementById('progress');
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');

      btn.disabled = true;
      btn.textContent = 'Génération...';
      progressEl.textContent = '';
      errorEl.textContent = '';
      successEl.textContent = '';

      try {
        const { PDFDocument } = window.PDFLib;
        if (!PDFDocument) throw new Error('PDFLib non chargé.');

        progressEl.textContent = 'Récupération des données...';
        const { allEntries, allFiches } = await loadAllData();
        const stats = computeStats(allFiches);

        const LINES_PER_PAGE = 15;
        const totalMCPages = Math.max(1, Math.ceil(allEntries.length / LINES_PER_PAGE));
        const n2Value = totalMCPages;

        // Charger les templates
        progressEl.textContent = 'Chargement des templates...';
        const mcTemplateBytes = await fetchPDF('./documents/Main courante-page3-FORM.pdf');
        const statsTemplateBytes = await fetchPDF('./documents/Main courante-page4-FORM.pdf');
        const autreDocBytes = await fetchPDF('./documents/Main courante_Autre.pdf');

        const autreDoc = await PDFDocument.load(autreDocBytes);
        if (autreDoc.getPages().length < 3) throw new Error('Main courante_Autre.pdf doit avoir au moins 3 pages.');

        const finalDoc = await PDFDocument.create();

        // Pages 1 et 2 de "Autre"
        const [ap1] = await finalDoc.copyPages(autreDoc, [0]); finalDoc.addPage(ap1);
        const [ap2] = await finalDoc.copyPages(autreDoc, [1]); finalDoc.addPage(ap2);

        // Pages main courante
        for (let p = 0; p < totalMCPages; p++) {
          progressEl.textContent = `Page MC ${p + 1}/${totalMCPages}...`;
          const pageDoc = await PDFDocument.load(mcTemplateBytes);
          const form = pageDoc.getForm();
          const start = p * LINES_PER_PAGE;
          const pageEntries = allEntries.slice(start, start + LINES_PER_PAGE);

          for (let i = 0; i < LINES_PER_PAGE; i++) {
            const ln = i + 1;
            const e = pageEntries[i] || null;
            form.getTextField(`A${ln}`).setText(e ? (e.heureArrivee || '') : '');
            form.getTextField(`O${ln}`).setText(e ? (e.origine || '') : '');
            form.getTextField(`D${ln}`).setText(e ? (e.destinataire || '') : '');
            form.getTextField(`E${ln}`).setText(e ? (e.description || '') : '');
            form.getTextField(`T${ln}`).setText(e ? (e.type || '') : '');
            form.getTextField(`S${ln}`).setText(e ? (e.suite || '') : '');
            form.getTextField(`F${ln}`).setText(e ? (e.heureDepart || '') : '');
          }

          const today = new Date();
          try { form.getTextField('Date').setText(today.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })); } catch (e) {}
          try { form.getTextField('N1').setText(String(p + 1)); } catch (e) {}
          try { form.getTextField('N2').setText(String(n2Value)); } catch (e) {}

          form.flatten();
          const [fp] = await finalDoc.copyPages(pageDoc, [0]); finalDoc.addPage(fp);
        }

        // Page stats
        progressEl.textContent = 'Statistiques...';
        const statsDoc = await PDFDocument.load(statsTemplateBytes);
        const sf = statsDoc.getForm();
        fillStatsForm(sf, stats, n2Value);
        sf.flatten();
        const [sp] = await finalDoc.copyPages(statsDoc, [0]); finalDoc.addPage(sp);

        // Page 3 de "Autre"
        const [ap3] = await finalDoc.copyPages(autreDoc, [2]); finalDoc.addPage(ap3);

        // Télécharger
        progressEl.textContent = 'Finalisation...';
        await downloadPDF(finalDoc, 'main-courante');

        successEl.textContent = '✅ Main courante téléchargée !';
        progressEl.textContent = '';
        btn.textContent = '📋 Télécharger la main courante';
        btn.disabled = false;

      } catch (e) {
        console.error(e);
        errorEl.textContent = 'Erreur: ' + e.message;
        btn.textContent = '📋 Télécharger la main courante';
        btn.disabled = false;
        progressEl.textContent = '';
      }
    };

    // ========== RAPPORT DE MISSION ==========
    window.generateRapportMission = async function() {
      const btn = document.getElementById('btn-rm');
      const progressEl = document.getElementById('progress');
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');

      btn.disabled = true;
      btn.textContent = 'Génération...';
      progressEl.textContent = '';
      errorEl.textContent = '';
      successEl.textContent = '';

      try {
        const { PDFDocument } = window.PDFLib;
        if (!PDFDocument) throw new Error('PDFLib non chargé.');

        progressEl.textContent = 'Récupération des données...';
        const { allFiches } = await loadAllData();
        const stats = computeStats(allFiches);

        progressEl.textContent = 'Chargement du template...';
        const rmTemplateBytes = await fetchPDF('./documents/Rapport_Mission_FORM.pdf');
        const rmDoc = await PDFDocument.load(rmTemplateBytes);
        const rmForm = rmDoc.getForm();

        fillStatsForm(rmForm, stats, null);
        rmForm.flatten();

        progressEl.textContent = 'Finalisation...';
        await downloadPDF(rmDoc, 'rapport-mission');

        successEl.textContent = '✅ Rapport de mission téléchargé !';
        progressEl.textContent = '';
        btn.textContent = '📊 Télécharger le rapport de mission';
        btn.disabled = false;

      } catch (e) {
        console.error(e);
        errorEl.textContent = 'Erreur: ' + e.message;
        btn.textContent = '📊 Télécharger le rapport de mission';
        btn.disabled = false;
        progressEl.textContent = '';
      }
    };

    // ========== FONCTIONS UTILITAIRES ==========
    function fillStatsForm(form, stats, n2Value) {
      try { if (n2Value !== null) form.getTextField('NombreDePage3').setText(String(n2Value)); } catch (e) {}
      try { form.getTextField('Total').setText(String(stats.total)); } catch (e) {}
      try { form.getTextField('Soins').setText(String(stats.totalSoins)); } catch (e) {}
      try { form.getTextField('Traumatismes').setText(String(stats.ctTrauma)); } catch (e) {}
      try { form.getTextField('Tromatismes').setText(String(stats.ctTrauma)); } catch (e) {}
      try { form.getTextField('Petits_Soins').setText(String(stats.ctPetitSoin)); } catch (e) {}
      try { form.getTextField('MalaisesEtMaladies').setText(String(stats.ctMalaise)); } catch (e) {}
      try { form.getTextField('Inconscients').setText(String(stats.ctInconscient)); } catch (e) {}
      try { form.getTextField('ACR').setText(String(stats.ctACR)); } catch (e) {}
      try { form.getTextField('DAE').setText(String(stats.totalDAE)); } catch (e) {}
      try { form.getTextField('Decharge').setText(String(stats.totalDecharge)); } catch (e) {}
      try { form.getTextField('EvacuationCRF').setText(String(stats.totalEvacCRF)); } catch (e) {}
      try { form.getTextField('EvacuationAutre').setText(String(stats.totalEvacAutre)); } catch (e) {}
    }

    async function downloadPDF(doc, prefix) {
      const pdfBytes = await doc.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const now = new Date();
      a.download = `${prefix}-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.pdf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
