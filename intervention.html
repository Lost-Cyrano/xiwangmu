<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xiwangmu CRF – Intervention</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; -webkit-tap-highlight-color: transparent; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    header { background: white; border-bottom: 1px solid #e5e5e5; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 100; }
    header .btn-back { width: 32px; height: 32px; border-radius: 50%; background: white; border: 1px solid #e0e0e0; color: #666; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1; flex-shrink: 0; text-decoration: none; }
    header .btn-back:hover { background: #f5f5f5; border-color: #ccc; }
    header .brand { display: flex; align-items: center; gap: 8px; flex: 1; }
    header .brand img { height: 24px; }
    header .brand span { font-weight: 600; font-size: 0.95rem; }
    .saved-indicator { font-size: 0.65rem; color: #0a0; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
    .saved-indicator.visible { opacity: 1; }
    .saved-indicator.error { color: #c00; }

    /* Navigation onglets */
    nav.tabs { background: white; border-bottom: 1px solid #e5e5e5; display: flex; gap: 0; flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    nav.tabs::-webkit-scrollbar { display: none; }
    nav.tabs button { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 0.78rem; color: #888; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; flex-shrink: 0; }
    nav.tabs button:hover { color: #444; }
    nav.tabs button.active { color: #e60000; border-bottom-color: #e60000; font-weight: 500; }

    /* Conteneur des onglets */
    .tabs-container { flex: 1; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; display: flex; scroll-behavior: smooth; }
    .tabs-container::-webkit-scrollbar { display: none; }

    .tab-panel { scroll-snap-align: start; min-width: 100%; width: 100%; height: 100%; overflow-y: auto; padding: 12px; flex-shrink: 0; }
    @media (min-width: 500px) { .tab-panel { padding: 16px; } }
    @media (min-width: 700px) { .tab-panel { padding: 24px; } }

    .tab-inner { max-width: 700px; margin: 0 auto; }

    .card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 14px; margin-bottom: 14px; width: 100%; }
    @media (min-width: 500px) { .card { padding: 18px; } }
    @media (min-width: 700px) { .card { padding: 22px; } }
    .card h2 { font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
    @media (min-width: 500px) { .card h2 { font-size: 0.95rem; } }

    .field { margin-bottom: 10px; }
    .field label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
    .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 0.85rem; font-family: inherit; background: #fafafa; transition: border 0.15s, background 0.15s; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #e60000; background: white; box-shadow: 0 0 0 3px rgba(230,0,0,0.06); }
    .field textarea { resize: vertical; min-height: 60px; }
    .field input:disabled { background: #f0f0f0; color: #999; cursor: not-allowed; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row .field { flex: 1; min-width: 130px; }

    .field-value { font-size: 0.85rem; color: #444; padding: 9px 0; }
    .field-value.empty { color: #ccc; font-style: italic; }

    .field-inline { display: flex; align-items: center; gap: 8px; }
    .field-inline input[type="checkbox"] { width: auto; accent-color: #e60000; }
    .field-inline label { margin-bottom: 0; text-transform: none; letter-spacing: 0; font-size: 0.8rem; cursor: pointer; }

    .access-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .access-chip { display: flex; align-items: center; gap: 4px; padding: 5px 8px; border-radius: 14px; border: 1px solid #e0e0e0; background: white; font-size: 0.7rem; cursor: pointer; transition: all 0.15s; }
    .access-chip.selected { background: #e60000; color: white; border-color: #e60000; }
    .access-chip.team-chip { font-weight: 500; }
    .access-chip .chip-avatar { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; }
    .access-chip.selected .chip-avatar { background: rgba(255,255,255,0.3); }
    .access-chip:not(.selected) .chip-avatar { background: #e60000; color: white; }

    .empty-tab { text-align: center; padding: 40px 20px; color: #bbb; font-size: 0.85rem; }

    .loading { text-align: center; padding: 40px 20px; color: #bbb; font-size: 0.9rem; }
    .error-banner { background: #fff5f5; border: 1px solid #fcc; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; color: #c00; font-size: 0.8rem; }

    @media (min-width: 500px) { header .brand img { height: 26px; } }
    @media (min-width: 700px) { header .brand img { height: 28px; } }
  </style>
</head>
<body>

<header>
  <button class="btn-back" onclick="goBack()" title="Retour">←</button>
  <div class="brand">
    <img src="https://github.com/Lost-Cyrano/xiwangmu/blob/main/images/Xiwangmu.png?raw=true" alt="Xiwangmu">
    <span>Fiche d'Intervention</span>
  </div>
  <span class="saved-indicator" id="savedIndicator">Enregistré</span>
</header>

<nav class="tabs" id="tabsNav">
  <button class="active" data-tab="0">Général</button>
  <button data-tab="1">Bilan</button>
  <button data-tab="2">Soins</button>
  <button data-tab="3">Évacuation</button>
  <button data-tab="4">Accès</button>
</nav>

<div class="tabs-container" id="tabsContainer">
  <!-- Les panneaux sont générés dynamiquement -->
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAigiFFGONooT17W11gnABs1aHKN0O3N9s",
    authDomain: "xiwangmu-crf.firebaseapp.com",
    projectId: "xiwangmu-crf",
    storageBucket: "xiwangmu-crf.firebasestorage.app",
    messagingSenderId: "990701485221",
    appId: "1:990701485221:web:efa9e1842c07af4fd1a14c",
    measurementId: "G-J9TZ23YECY"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let CURRENT_NIVOL = null;
  let USER_ROLE = null;
  let HOME_PAGE = './user.html';
  let ficheId = null;
  let ficheData = null;
  let teamMembers = [];
  let canEditAccess = false;
  let selectedAccess = [];
  let saveTimeout = null;
  let isSaving = false;
  let currentTab = 0;

  const urlParams = new URLSearchParams(window.location.search);
  ficheId = urlParams.get('id');

  if (!ficheId) {
    onAuthStateChanged(auth, async (user) => {
      if (user?.displayName) window.location.href = user.photoURL === 'cdp' ? './ci.html' : './user.html';
      else window.location.href = './login.html';
    });
  } else {
    onAuthStateChanged(auth, async (user) => {
      if (!user?.displayName) { window.location.href = './login.html?redirect=' + encodeURIComponent(window.location.href)); return; }
      CURRENT_NIVOL = user.displayName;
      USER_ROLE = user.photoURL;
      HOME_PAGE = USER_ROLE === 'cdp' ? './ci.html' : './user.html';
      canEditAccess = USER_ROLE === 'cdp';
      await init();
    });
  }

  window.goBack = () => window.location.href = HOME_PAGE;

  async function init() {
    try {
      const ficheSnap = await getDoc(doc(db, 'I', ficheId));
      if (!ficheSnap.exists()) { showError('Fiche introuvable.'); return; }
      ficheData = { id: ficheSnap.id, ...ficheSnap.data() };

      const userSnap = await getDoc(doc(db, 'U', CURRENT_NIVOL));
      if (!userSnap.exists()) { window.location.href = './login.html'; return; }
      const userEquipeId = userSnap.data().E || null;

      if (ficheData.equipe !== userEquipeId) { showError('Cette fiche appartient à une autre équipe.'); return; }
      if (USER_ROLE !== 'cdp') {
        const access = ficheData.access;
        if (access?.length > 0 && !access.includes('__TEAM__') && !access.includes(CURRENT_NIVOL)) {
          showError('Vous n\'avez pas accès à cette fiche.'); return;
        }
      }

      await loadTeamMembers(ficheData.equipe);
      selectedAccess = ficheData.access?.length > 0 ? [...ficheData.access] : ['__TEAM__'];
      
      // Ajuster les onglets visibles
      updateTabsVisibility();
      renderAllPanels();
      setupTabNavigation();
      setupScrollSync();

    } catch (e) { showError('Erreur: ' + e.message); }
  }

  function updateTabsVisibility() {
    const tab4 = document.querySelector('nav.tabs button[data-tab="4"]');
    if (tab4) tab4.style.display = canEditAccess ? '' : 'none';
  }

  function showError(msg) {
    document.getElementById('tabsContainer').innerHTML = `<div class="tab-panel"><div class="tab-inner"><div class="error-banner">${msg}</div><button onclick="goBack()" style="background:#e60000;color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;">Retour</button></div></div>`;
  }

  async function loadTeamMembers(equipeId) {
    try {
      const q = query(collection(db, 'U'), where('E', '==', equipeId));
      const snap = await getDocs(q);
      teamMembers = [];
      snap.forEach(d => teamMembers.push({ nivol: d.id, nom: d.data().I || '?', fonction: d.data().F || '?' }));
    } catch (e) { console.error(e); }
  }

  function getInitials(nom) {
    if (!nom || nom === 'Inconnu') return '?';
    const parts = nom.trim().split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    return nom.substring(0, 2).toUpperCase();
  }

  function calculateAge(birthDate) {
    if (!birthDate) return null;
    const today = new Date();
    const birth = new Date(birthDate);
    let age = today.getFullYear() - birth.getFullYear();
    const m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
    return age;
  }

  function renderAllPanels() {
    const container = document.getElementById('tabsContainer');
    container.innerHTML = `
      <div class="tab-panel" id="panel-0"><div class="tab-inner">${renderGeneralTab()}</div></div>
      <div class="tab-panel" id="panel-1"><div class="tab-inner"><div class="card"><div class="empty-tab">Bilan — à venir</div></div></div></div>
      <div class="tab-panel" id="panel-2"><div class="tab-inner"><div class="card"><div class="empty-tab">Soins — à venir</div></div></div></div>
      <div class="tab-panel" id="panel-3"><div class="tab-inner"><div class="card"><div class="empty-tab">Évacuation — à venir</div></div></div></div>
      ${canEditAccess ? `<div class="tab-panel" id="panel-4"><div class="tab-inner">${renderAccessTab()}</div></div>` : ''}
    `;
    bindAutoSave();
  }

  function renderGeneralTab() {
    const d = ficheData;
    const createdAt = d.createdAt?.toDate ? d.createdAt.toDate() : new Date(d.createdAt || Date.now());
    const age = d.victimeAge || '';
    const isMineur = age && parseInt(age) < 18;

    return `
      <div class="card">
        <h2>Fiche ${ficheId}</h2>
        <div class="field-value" style="font-size:0.75rem;color:#888;margin-bottom:12px;">
          Créée le ${createdAt.toLocaleDateString('fr-FR', {day:'numeric',month:'long',year:'numeric'})} à ${createdAt.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}
        </div>
        <div class="field">
          <label>NOM Prénom</label>
          <input type="text" id="edit-victimeNom" value="${d.victimeNom || ''}" placeholder="NOM Prénom">
        </div>
        <div class="row">
          <div class="field">
            <label>N° Dossard</label>
            <input type="number" id="edit-dossard" value="${d.dossard || ''}" placeholder="N°" min="0">
          </div>
          <div class="field">
            <label>Âge</label>
            <input type="number" id="edit-victimeAge" value="${age}" placeholder="Âge" min="0" max="150">
          </div>
        </div>
        <div class="field">
          <label>Date de naissance</label>
          <input type="date" id="edit-dateNaissance" value="${d.dateNaissance || ''}" ${age ? 'disabled' : ''}>
        </div>
        <div class="field-inline" style="margin-bottom:10px;">
          <input type="checkbox" id="edit-mineur" disabled ${isMineur ? 'checked' : ''}>
          <label>Mineur</label>
        </div>
        <div class="row">
          <div class="field">
            <label>Type de soins</label>
            <select id="edit-typeSoins" onchange="handleTypeSoinsChange()">
              <option value="">--</option>
              <option value="Petit soin" ${d.typeSoins === 'Petit soin' ? 'selected' : ''}>Petit soin</option>
              <option value="Traumatisme" ${d.typeSoins === 'Traumatisme' ? 'selected' : ''}>Traumatisme</option>
              <option value="Malaise/maladie" ${d.typeSoins === 'Malaise/maladie' ? 'selected' : ''}>Malaise/maladie</option>
              <option value="Inconscient" ${d.typeSoins === 'Inconscient' ? 'selected' : ''}>Inconscient</option>
              <option value="Arrêt Cardiaque" ${d.typeSoins === 'Arrêt Cardiaque' ? 'selected' : ''}>Arrêt Cardiaque</option>
              <option value="Autre" ${d.typeSoins && !['Petit soin','Traumatisme','Malaise/maladie','Inconscient','Arrêt Cardiaque'].includes(d.typeSoins) && d.typeSoins !== '' ? 'selected' : ''}>Autre</option>
            </select>
            <input type="text" id="edit-typeSoins-autre" value="${d.typeSoins && !['Petit soin','Traumatisme','Malaise/maladie','Inconscient','Arrêt Cardiaque',''].includes(d.typeSoins) ? d.typeSoins : ''}" placeholder="Précisez..." style="margin-top:4px;${d.typeSoins && !['Petit soin','Traumatisme','Malaise/maladie','Inconscient','Arrêt Cardiaque',''].includes(d.typeSoins) ? '' : 'display:none;'}">
          </div>
          <div class="field">
            <label>Origine</label>
            <select id="edit-origine" onchange="handleOrigineChange()">
              <option value="">--</option>
              <option value="Orga" ${d.origine === 'Orga' ? 'selected' : ''}>Orga</option>
              <option value="Public" ${d.origine === 'Public' ? 'selected' : ''}>Public</option>
              <option value="Autre" ${d.origine && d.origine !== 'Orga' && d.origine !== 'Public' ? 'selected' : ''}>Autre</option>
            </select>
            <input type="text" id="edit-origine-autre" value="${d.origine && d.origine !== 'Orga' && d.origine !== 'Public' ? d.origine : ''}" placeholder="Précisez..." style="margin-top:4px;${d.origine && d.origine !== 'Orga' && d.origine !== 'Public' ? '' : 'display:none;'}">
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Adresse</h2>
        <div class="field">
          <label>Adresse</label>
          <input type="text" id="edit-adresse" value="${d.adresse || ''}" placeholder="Adresse">
        </div>
        <div class="field">
          <label>Code postal</label>
          <input type="text" id="edit-codePostal" value="${d.codePostal || ''}" placeholder="Code postal" maxlength="10">
        </div>
      </div>

      <div class="card">
        <h2>Contact</h2>
        <div class="field">
          <label>Personne à prévenir</label>
          <input type="text" id="edit-contactNom" value="${d.contactNom || ''}" placeholder="NOM Prénom">
        </div>
        <div class="field">
          <label>Numéro de téléphone</label>
          <input type="tel" id="edit-contactTel" value="${d.contactTel || ''}" placeholder="06 12 34 56 78">
        </div>
      </div>
    `;
  }

  function renderAccessTab() {
    let html = `<div class="card"><h2>Accès</h2><div class="access-list" id="access-container">`;
    html += `<div class="access-chip team-chip ${selectedAccess.includes('__TEAM__') ? 'selected' : ''}" data-nivol="__TEAM__" onclick="toggleAccess(this)"><span class="chip-avatar">T</span> Toute l'équipe</div>`;
    teamMembers.forEach(m => {
      html += `<div class="access-chip ${selectedAccess.includes(m.nivol) ? 'selected' : ''}" data-nivol="${m.nivol}" onclick="toggleAccess(this)"><span class="chip-avatar">${getInitials(m.nom)}</span> ${m.nom}</div>`;
    });
    html += `</div></div>`;
    return html;
  }

  window.toggleAccess = function(chip) {
    if (!canEditAccess) return;
    const nivol = chip.dataset.nivol;
    if (nivol === '__TEAM__') { selectedAccess = selectedAccess.includes('__TEAM__') ? [] : ['__TEAM__']; }
    else {
      if (selectedAccess.includes(nivol)) selectedAccess = selectedAccess.filter(n => n !== nivol);
      else { selectedAccess = selectedAccess.filter(n => n !== '__TEAM__'); selectedAccess.push(nivol); }
      if (selectedAccess.length === teamMembers.length && teamMembers.length > 0) selectedAccess = ['__TEAM__'];
      if (selectedAccess.length === 0) selectedAccess = ['__TEAM__'];
    }
    document.getElementById('access-container').innerHTML = renderAccessTab().match(/<div class="access-list" id="access-container">([\s\S]*?)<\/div>/)[1];
    autoSave({ access: selectedAccess });
  };

  // Navigation
  function setupTabNavigation() {
    const buttons = document.querySelectorAll('nav.tabs button');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const index = parseInt(btn.dataset.tab);
        goToTab(index);
      });
    });
  }

  function setupScrollSync() {
    const container = document.getElementById('tabsContainer');
    container.addEventListener('scroll', () => {
      const scrollLeft = container.scrollLeft;
      const panelWidth = container.clientWidth;
      const newTab = Math.round(scrollLeft / panelWidth);
      if (newTab !== currentTab && newTab >= 0 && newTab < document.querySelectorAll('.tab-panel').length) {
        currentTab = newTab;
        updateActiveTabButton();
      }
    });
  }

  function goToTab(index) {
    const container = document.getElementById('tabsContainer');
    const panelWidth = container.clientWidth;
    container.scrollTo({ left: index * panelWidth, behavior: 'smooth' });
    currentTab = index;
    updateActiveTabButton();
  }

  function updateActiveTabButton() {
    document.querySelectorAll('nav.tabs button').forEach((btn, i) => {
      btn.classList.toggle('active', i === currentTab);
    });
    // Scroll the tab into view if needed
    const activeBtn = document.querySelector(`nav.tabs button[data-tab="${currentTab}"]`);
    if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  window.handleOrigineChange = function() {
    const sel = document.getElementById('edit-origine');
    const autre = document.getElementById('edit-origine-autre');
    if (sel.value === 'Autre') { autre.style.display = 'block'; } else { autre.style.display = 'none'; autre.value = ''; }
    autoSaveField();
  };

  window.handleTypeSoinsChange = function() {
    const sel = document.getElementById('edit-typeSoins');
    const autre = document.getElementById('edit-typeSoins-autre');
    if (sel.value === 'Autre') { autre.style.display = 'block'; } else { autre.style.display = 'none'; autre.value = ''; }
    autoSaveField();
  };

  function bindAutoSave() {
    const ageInput = document.getElementById('edit-victimeAge');
    const dateInput = document.getElementById('edit-dateNaissance');
    const mineurCheck = document.getElementById('edit-mineur');

    if (ageInput) {
      ageInput.addEventListener('input', () => {
        const age = parseInt(ageInput.value);
        if (ageInput.value) {
          if (dateInput) dateInput.disabled = true;
          if (mineurCheck) mineurCheck.checked = !isNaN(age) && age < 18;
        } else {
          if (dateInput) dateInput.disabled = false;
          if (mineurCheck) mineurCheck.checked = false;
        }
        autoSaveField();
      });
    }

    if (dateInput) {
      dateInput.addEventListener('change', () => {
        if (dateInput.value) {
          const age = calculateAge(dateInput.value);
          if (ageInput) { ageInput.value = age; ageInput.disabled = true; }
          if (mineurCheck) mineurCheck.checked = age !== null && age < 18;
        } else {
          if (ageInput) ageInput.disabled = false;
          if (mineurCheck) mineurCheck.checked = false;
        }
        autoSaveField();
      });
    }

    // Tous les autres champs
    document.querySelectorAll('input:not([type="checkbox"]):not(#edit-victimeAge):not(#edit-dateNaissance), select, textarea').forEach(el => {
      el.addEventListener('change', autoSaveField);
      el.addEventListener('input', autoSaveField);
    });
  }

  window.autoSaveField = function() {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => autoSave(), 500);
  };

  async function autoSave(extraData = {}) {
    if (isSaving) return;
    isSaving = true;
    const indicator = document.getElementById('savedIndicator');
    indicator.textContent = '...';
    indicator.className = 'saved-indicator visible';

    try {
      const getVal = (id) => document.getElementById(id)?.value?.trim() || null;
      
      let victimeNom = getVal('edit-victimeNom');
      let dossard = getVal('edit-dossard');
      let victimeAge = getVal('edit-victimeAge');
      victimeAge = victimeAge ? parseInt(victimeAge) : null;
      let dateNaissance = getVal('edit-dateNaissance');
      let adresse = getVal('edit-adresse');
      let codePostal = getVal('edit-codePostal');
      let contactNom = getVal('edit-contactNom');
      let contactTel = getVal('edit-contactTel');

      let origine = document.getElementById('edit-origine')?.value || '';
      if (origine === 'Autre') origine = getVal('edit-origine-autre') || 'Autre';

      let typeSoins = document.getElementById('edit-typeSoins')?.value || '';
      if (typeSoins === 'Autre') typeSoins = getVal('edit-typeSoins-autre') || 'Autre';

      const data = {
        victimeNom, dossard, victimeAge, dateNaissance, adresse, codePostal, contactNom, contactTel,
        origine: origine || null, typeSoins: typeSoins || null,
        ...extraData
      };

      await setDoc(doc(db, 'I', ficheId), data, { merge: true });

      if (ficheData.mcId) {
        await setDoc(doc(db, 'M', ficheData.mcId), {
          victime: victimeNom, type: typeSoins || null, origine: origine || null
        }, { merge: true });
      }

      indicator.textContent = 'Enregistré';
      indicator.className = 'saved-indicator visible';
      setTimeout(() => { indicator.className = 'saved-indicator'; }, 1500);
    } catch (e) {
      console.error(e);
      indicator.textContent = 'Erreur';
      indicator.className = 'saved-indicator visible error';
      setTimeout(() => { indicator.className = 'saved-indicator'; }, 2500);
    }
    isSaving = false;
  }
</script>
</body>
